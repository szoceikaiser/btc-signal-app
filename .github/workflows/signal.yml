name: Signal-Engine

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:
    inputs:
      test_telegram:
        description: "Nur Telegram-Testnachricht senden"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: signal-engine
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Telegram-Testnachricht
        if: ${{ inputs.test_telegram }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: cd engine && python3 main.py --test-telegram

      - name: Engine-Lauf
        if: ${{ !inputs.test_telegram }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: cd engine && python3 main.py

      - name: Zustand committen
        if: ${{ !inputs.test_telegram }}
        run: |
          git config user.name "signal-engine"
          git config user.email "actions@users.noreply.github.com"
          git add site/data
          git diff --cached --quiet || git commit -m "Engine-Lauf: Zustand aktualisiert"
          git push
